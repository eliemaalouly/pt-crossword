name: Generate crossword PDF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Run generator
        run: python daily_crossword.py

      - name: Recreate rmapi config
        run: |
          mkdir -p "$HOME/.config/rmapi"
          cat > "$HOME/.config/rmapi/rmapi.conf" <<'EOF'
          ${{ secrets.RMAPI_CONFIG }}
          EOF
          chmod 600 "$HOME/.config/rmapi/rmapi.conf"

      - name: Verify rmapi config exists
        run: |
          ls -la "$HOME/.config/rmapi"
          test -f "$HOME/.config/rmapi/rmapi.conf"
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build rmapi from source
        run: |
          git clone https://github.com/ddvk/rmapi
          cd rmapi
          go install
          rmapi version
      
      - name: Test rmapi upload
        run: |
          rmapi ls /
          rmapi put --force daily_crossword.pdf /

      - name: Commit PDF
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add daily_crossword.pdf
          git diff --cached --quiet || git commit -m "Update daily PDF"
          git push